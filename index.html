<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script src="https://raw.githack.com/fcor/aframe-gesture-detector-component/master/dist/aframe-gesture-detector.component.min.js"></script>
    <script src="https://raw.githack.com/fcor/aframe-gesture-handler-component/master/dist/gesture-handler.min.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene 
      embedded 
      arjs 
      gesture-detector
      id="scene">

      <a-marker type="pattern" url="tenun.patt">

        <a-entity
          id="model-3d"
          gltf-model="url(tenun.glb)"
          position="0 0 0"
          scale="0.5 0.5 0.5"
          class="clickable"
          gesture-handler>

        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
