<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script src="https://raw.githack.com/fcor/aframe-gesture-detector-component/master/dist/aframe-gesture-detector.component.min.js"></script>
    <script src="https://raw.githack.com/fcor/aframe-gesture-handler-component/master/dist/gesture-handler.min.js"></script>

    <style>
      /* PAKSA BODY DAN HTML AGAR TIDAK PUNYA MARGIN DAN OVERFLOW HIDDEN */
      body, html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }

      /* PAKSA KANVAS AR DAN VIDEO KAMERA AGAR BENAR-BENAR FULL-SCREEN Tanpa Zoom Berlebih */
      .a-canvas {
        width: 100% !important;
        height: 100% !important;
      }

      #arjs-video {
        width: 100% !important;
        height: 100% !important;
        margin-left: 0 !important;
        top: 0 !important;
        /* Ganti 'cover' ke 'contain' jika ingin melihat seluruh area kamera tanpa zoom sama sekali, 
           tetapi mungkin akan muncul bar hitam di pinggir jika rasio layar berbeda */
        object-fit: cover !important; 
      }
    </style>
  </head>

  <body>
    <a-scene 
      embedded 
      arjs="sourceType: webcam; 
            debugUIEnabled: false; 
            detectionMode: mono_and_matrix; 
            matrixCodeType: 3x3;"
      gesture-detector
      vr-mode-ui="enabled: false"
      id="scene">

      <a-marker type="pattern" url="tenun.patt">
        <a-entity
          id="model-3d"
          gltf-model="url(tenun.glb)"
          /* PENTING: Position 0 0.5 0 agar model sedikit melayang di atas marker, 
             dan scale 0.5 0.5 0.5 untuk tes ukuran */
          position="0 0.5 0"
          scale="0.5 0.5 0.5"
          class="clickable"
          gesture-handler>
        </a-entity>
      </a-marker>

      <a-entity camera fov="60"></a-entity>
      
    </a-scene>
  </body>
</html>
