<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script src="https://raw.githack.com/fcor/aframe-gesture-detector-component/master/dist/aframe-gesture-detector.component.min.js"></script>
    <script src="https://raw.githack.com/fcor/aframe-gesture-handler-component/master/dist/gesture-handler.min.js"></script>

    <style>
      /* Fix tambahan agar video memenuhi layar dengan benar tanpa stretching */
      #arjs-video {
        object-fit: cover !important;
        width: 100vw !important;
        height: 100vh !important;
      }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene 
      embedded 
      arjs="sourceType: webcam; 
            displayWidth: 1280; 
            displayHeight: 720; 
            sourceWidth: 1280; 
            sourceHeight: 720; 
            debugUIEnabled: false;"
      gesture-detector
      vr-mode-ui="enabled: false"
      id="scene">

      <a-marker type="pattern" url="tenun.patt">

        <a-entity
          id="model-3d"
          gltf-model="url(tenun.glb)"
          position="0 0 0"
          scale="0.5 0.5 0.5"
          class="clickable"
          gesture-handler>

        </a-entity>
      </a-marker>

      <a-entity camera fov="80"></a-entity>
      
    </a-scene>
  </body>
</html>
